<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ぶんどきシューティング Ver2</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center}
canvas{display:block;margin:10px auto;background:#000;border:2px solid #555;touch-action:none}
</style>
</head>
<body>
<h2>ぶんどきシューティング Ver2 💥</h2>
<p>画面を左右になぞると自機が動きます</p>
<canvas id="cv" width="360" height="520"></canvas>
<p id="score">Score: 0</p>
<script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
let px=180,target=180,score=0;
const bullets=[],enemies=[],effects=[];
cv.onpointermove=e=>{
 const r=cv.getBoundingClientRect();
 target=(e.clientX-r.left)*(cv.width/r.width);
};
setInterval(()=>bullets.push({x:px,y:470}),180);
setInterval(()=>enemies.push({x:20+Math.random()*320,y:-20}),700);

function boom(x,y){
 for(let i=0;i<16;i++){
   effects.push({
     x,y,
     vx:(Math.random()-0.5)*5,
     vy:(Math.random()-0.5)*5,
     life:30,
     size:2+Math.random()*3
   });
 }
}

function loop(){
 requestAnimationFrame(loop);
 ctx.fillStyle="#000";
 ctx.fillRect(0,0,360,520);

 px+=(target-px)*0.2;
 ctx.fillStyle="cyan";
 ctx.beginPath();
 ctx.moveTo(px,440);
 ctx.lineTo(px-18,500);
 ctx.lineTo(px+18,500);
 ctx.closePath();
 ctx.fill();

 for(let i=bullets.length-1;i>=0;i--){
   let b=bullets[i];
   b.y-=8;
   ctx.fillStyle="yellow";
   ctx.fillRect(b.x-2,b.y,4,10);
   if(b.y<0)bullets.splice(i,1);
 }

 for(let i=enemies.length-1;i>=0;i--){
   let e=enemies[i];
   e.y+=3;
   ctx.fillStyle="red";
   ctx.beginPath();
   ctx.arc(e.x,e.y,14,0,Math.PI*2);
   ctx.fill();

   if(e.y>540){enemies.splice(i,1);continue;}

   for(let j=bullets.length-1;j>=0;j--){
      let b=bullets[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<18){
         boom(e.x,e.y);
         enemies.splice(i,1);
         bullets.splice(j,1);
         score+=100;
         document.getElementById("score").textContent="Score: "+score;
         break;
      }
   }
 }

 for(let i=effects.length-1;i>=0;i--){
    let p=effects[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    if(p.life<=0)effects.splice(i,1);
 }
}
loop();
</script>
</body>
</html>
